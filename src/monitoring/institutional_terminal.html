<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Quant Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --bg: #050914;
      --surface: rgba(10,16,30,0.78);
      --surface-2: rgba(15,22,40,0.88);
      --border: rgba(0,212,255,0.08);
      --accent: #00d4ff;
      --green: #00e676;
      --red: #ff3d6b;
      --yellow: #ffd166;
      --text: #c8d8e8;
      --text-dim: #5a7a96;
      --shadow-soft: 0 20px 70px rgba(0,0,0,0.24);
      --sidebar-width: 280px;
      --topbar-height: 64px;
      --radius: 4px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Space Mono", monospace;
      font-feature-settings: "tnum" 1, "liga" 0;
      text-rendering: geometricPrecision;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 8%, rgba(0,212,255,0.07), transparent 28%),
        radial-gradient(circle at 78% 0%, rgba(0,230,118,0.035), transparent 30%),
        linear-gradient(135deg, #050914 0%, #060b17 42%, #050914 100%);
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: 4;
      content: "";
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.018) 0,
        rgba(255,255,255,0.018) 1px,
        transparent 1px,
        transparent 5px
      );
      opacity: 0.14;
      mix-blend-mode: screen;
    }

    body::after {
      position: fixed;
      inset: auto -20% -32% -20%;
      height: 54vh;
      content: "";
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(0,212,255,0.055), transparent 62%);
      filter: blur(28px);
      animation: ambientDrift 24s ease-in-out infinite alternate;
    }

    @keyframes ambientDrift {
      from { transform: translate3d(-1.4%, 0, 0); opacity: 0.54; }
      to { transform: translate3d(1.4%, -1%, 0); opacity: 0.82; }
    }

    button,
    select,
    input {
      color: inherit;
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    select:focus-visible,
    [tabindex]:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
    }

    .terminal-shell {
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 10;
      display: flex;
      width: var(--sidebar-width);
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-soft);
    }

    .brand {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .brand-title {
      margin: 0;
      font-family: "Syne", sans-serif;
      font-size: 22px;
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: 1.8px;
      color: var(--text);
    }

    .brand-title span {
      color: var(--accent);
    }

    .brand-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      box-shadow: 0 0 0 4px rgba(90,122,150,0.09);
    }

    .status-dot.is-live,
    .status-dot.is-open,
    .status-dot.is-ok,
    .status-dot.is-buy,
    .status-dot.is-green {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(0,230,118,0.08);
    }

    .status-dot.is-paper,
    .status-dot.is-warn,
    .status-dot.is-hold,
    .status-dot.is-yellow {
      background: var(--yellow);
      box-shadow: 0 0 0 4px rgba(255,209,102,0.08);
    }

    .status-dot.is-error,
    .status-dot.is-closed,
    .status-dot.is-sell,
    .status-dot.is-red {
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(255,61,107,0.08);
    }

    .nav {
      display: grid;
      gap: 4px;
      padding: 18px 12px;
    }

    .nav-button {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text-dim);
      background: transparent;
      font-size: 11px;
      letter-spacing: 1.6px;
      text-align: left;
      text-transform: uppercase;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav-button:hover {
      color: var(--text);
      background: rgba(255,255,255,0.025);
      border-color: rgba(0,212,255,0.06);
    }

    .nav-button[aria-selected="true"] {
      color: var(--accent);
      background: rgba(0,212,255,0.055);
      border-color: rgba(0,212,255,0.11);
    }

    .nav-index {
      color: currentColor;
      opacity: 0.72;
      font-size: 10px;
    }

    .sidebar-telemetry {
      display: grid;
      gap: 16px;
      margin-top: auto;
      padding: 18px 20px 22px;
      border-top: 1px solid var(--border);
    }

    .telemetry-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .telemetry-cell {
      min-height: 54px;
      padding: 9px 10px;
      border: 1px solid rgba(0,212,255,0.055);
      border-radius: var(--radius);
      background: rgba(15,22,40,0.45);
    }

    .label {
      display: block;
      color: var(--text-dim);
      font-size: 9px;
      line-height: 1.3;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .value {
      display: block;
      margin-top: 5px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.2;
    }

    .risk-rail {
      width: 100%;
      height: 6px;
      overflow: hidden;
      border: 1px solid rgba(0,212,255,0.06);
      border-radius: var(--radius);
      background: rgba(5,9,20,0.84);
    }

    .risk-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, rgba(0,212,255,0.2), var(--accent));
      transition: width 320ms ease, background 320ms ease;
    }

    .topbar {
      position: fixed;
      top: 0;
      right: 0;
      left: var(--sidebar-width);
      z-index: 9;
      display: grid;
      grid-template-columns: repeat(7, minmax(116px, 1fr));
      min-height: var(--topbar-height);
      border-bottom: 1px solid var(--border);
      background: rgba(5,9,20,0.74);
      backdrop-filter: blur(20px);
    }

    .topbar-item {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: center;
      padding: 0 16px;
      border-right: 1px solid rgba(0,212,255,0.055);
    }

    .topbar-item:last-child {
      border-right: 0;
    }

    .topbar-value {
      overflow: hidden;
      color: var(--text);
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .workspace {
      min-height: 100vh;
      margin-left: var(--sidebar-width);
      padding: calc(var(--topbar-height) + 16px) 16px 28px;
    }

    .workspace-inner {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 8px;
      max-width: 1880px;
      margin: 0 auto;
    }

    .span-12 { grid-column: span 12; }
    .span-9 { grid-column: span 9; }
    .span-8 { grid-column: span 8; }
    .span-7 { grid-column: span 7; }
    .span-6 { grid-column: span 6; }
    .span-5 { grid-column: span 5; }
    .span-4 { grid-column: span 4; }
    .span-3 { grid-column: span 3; }
    .span-2 { grid-column: span 2; }

    .panel,
    .metric-card,
    .alert-card,
    .spotlight-card,
    .regime-card {
      border: 1px solid rgba(0,212,255,0.06);
      border-radius: var(--radius);
      background: var(--surface);
      backdrop-filter: blur(20px);
      box-shadow: 0 16px 42px rgba(0,0,0,0.16);
    }

    .panel {
      min-height: 128px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      min-height: 46px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 13px 14px;
      border-bottom: 1px solid rgba(0,212,255,0.055);
    }

    .panel-title {
      margin: 0;
      color: var(--text);
      font-family: "Syne", sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.8px;
    }

    .panel-meta {
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .panel-body {
      padding: 14px;
    }

    .metric-grid {
      display: grid;
      grid-column: span 12;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .metric-card {
      position: relative;
      min-height: 106px;
      padding: 14px;
      overflow: hidden;
    }

    .metric-card::before {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      height: 1px;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.35), transparent);
    }

    .metric-value {
      display: block;
      margin-top: 12px;
      color: var(--text);
      font-size: clamp(20px, 1.75vw, 30px);
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .metric-value.positive,
    .text-positive {
      color: var(--green);
    }

    .metric-value.negative,
    .text-negative {
      color: var(--red);
    }

    .metric-value.neutral,
    .text-neutral {
      color: var(--yellow);
    }

    .metric-foot {
      margin-top: 10px;
      color: var(--text-dim);
      font-size: 10px;
      line-height: 1.35;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .select-control {
      min-width: 136px;
      height: 34px;
      padding: 0 30px 0 10px;
      border: 1px solid rgba(0,212,255,0.08);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(5,9,20,0.72);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .button,
    .retry-button {
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(0,212,255,0.11);
      border-radius: var(--radius);
      color: var(--accent);
      background: rgba(0,212,255,0.045);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .button:hover,
    .retry-button:hover {
      transform: translateY(-1px);
      border-color: rgba(0,212,255,0.22);
      background: rgba(0,212,255,0.075);
    }

    .table-wrap {
      overflow: auto;
      max-height: 520px;
      border: 1px solid rgba(0,212,255,0.055);
      border-radius: var(--radius);
      background: rgba(5,9,20,0.38);
    }

    table {
      width: 100%;
      min-width: 860px;
      border-collapse: separate;
      border-spacing: 0;
      color: var(--text);
      font-size: 11px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,212,255,0.045);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      color: var(--text-dim);
      background: rgba(9,15,28,0.96);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.7px;
      text-transform: uppercase;
      backdrop-filter: blur(20px);
    }

    th[data-sort-key] {
      cursor: pointer;
      user-select: none;
    }

    th[data-sort-key]::after {
      content: "↕";
      margin-left: 6px;
      color: rgba(90,122,150,0.62);
      font-size: 9px;
    }

    th[aria-sort="ascending"]::after {
      content: "↑";
      color: var(--accent);
    }

    th[aria-sort="descending"]::after {
      content: "↓";
      color: var(--accent);
    }

    tbody tr {
      transition: background 140ms ease;
    }

    tbody tr:hover {
      background: rgba(0,212,255,0.035);
    }

    .row-buy {
      background: rgba(0,230,118,0.028);
    }

    .row-sell {
      background: rgba(255,61,107,0.032);
    }

    .row-warn {
      background: rgba(255,209,102,0.026);
    }

    .right {
      text-align: right;
    }

    .center {
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      padding: 0 8px;
      border: 1px solid rgba(0,212,255,0.08);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(255,255,255,0.018);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge.buy,
    .badge.long,
    .badge.high {
      border-color: rgba(0,230,118,0.16);
      color: var(--green);
      background: rgba(0,230,118,0.045);
    }

    .badge.sell,
    .badge.short,
    .badge.tier-1,
    .badge.low-risk {
      border-color: rgba(255,61,107,0.16);
      color: var(--red);
      background: rgba(255,61,107,0.045);
    }

    .badge.hold,
    .badge.medium,
    .badge.tier-2 {
      border-color: rgba(255,209,102,0.18);
      color: var(--yellow);
      background: rgba(255,209,102,0.045);
    }

    .badge.tier-3,
    .badge.speculative {
      color: var(--text-dim);
    }

    .split-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .triple-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .quad-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .spotlight-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .spotlight-card,
    .alert-card,
    .regime-card {
      padding: 14px;
    }

    .spotlight-top,
    .alert-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .symbol {
      color: var(--text);
      font-family: "Syne", sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.8px;
    }

    .small-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .small-stat {
      padding-top: 8px;
      border-top: 1px solid rgba(0,212,255,0.055);
    }

    .feed {
      display: grid;
      gap: 8px;
      max-height: 472px;
      overflow: auto;
    }

    .feed-item {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(0,212,255,0.055);
      border-left-color: rgba(0,212,255,0.18);
      border-radius: var(--radius);
      background: rgba(5,9,20,0.42);
    }

    .feed-time {
      color: var(--text-dim);
      font-size: 10px;
    }

    .feed-message {
      color: var(--text);
      font-size: 11px;
      line-height: 1.5;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .tag {
      padding: 2px 6px;
      border: 1px solid rgba(0,212,255,0.065);
      border-radius: var(--radius);
      color: var(--text-dim);
      background: rgba(255,255,255,0.016);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .regime-card {
      min-height: 136px;
    }

    .regime-value {
      margin-top: 18px;
      color: var(--text);
      font-family: "Syne", sans-serif;
      font-size: clamp(24px, 2.4vw, 42px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .playbook {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 8px;
      align-items: stretch;
    }

    .playbook-primary {
      display: grid;
      align-content: center;
      min-height: 150px;
      padding: 16px;
      border: 1px solid rgba(0,212,255,0.055);
      border-radius: var(--radius);
      background: rgba(5,9,20,0.38);
    }

    .playbook-list {
      display: grid;
      gap: 8px;
    }

    .rule-row {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(0,212,255,0.045);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.014);
    }

    .chart-frame {
      position: relative;
      min-height: 260px;
      padding: 8px;
      border: 1px solid rgba(0,212,255,0.045);
      border-radius: var(--radius);
      background: rgba(5,9,20,0.36);
    }

    .chart-frame.compact {
      min-height: 220px;
    }

    .chart-frame canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .empty-state,
    .error-state,
    .loading-state {
      display: grid;
      min-height: 168px;
      place-items: center;
      padding: 28px;
      text-align: center;
    }

    .state-title {
      color: var(--text);
      font-family: "Syne", sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.7px;
    }

    .state-copy {
      max-width: 420px;
      margin: 8px auto 0;
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.65;
    }

    .skeleton-grid {
      display: grid;
      width: 100%;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .skeleton-line,
    .skeleton-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(90,122,150,0.09);
    }

    .skeleton-card {
      height: 84px;
    }

    .skeleton-line {
      height: 11px;
      margin: 9px 0;
    }

    .skeleton-line::after,
    .skeleton-card::after {
      position: absolute;
      inset: 0;
      content: "";
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.075), transparent);
      animation: shimmer 1.75s infinite;
    }

    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    .partial-warning {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      padding: 9px 10px;
      border: 1px solid rgba(255,209,102,0.14);
      border-radius: var(--radius);
      color: var(--yellow);
      background: rgba(255,209,102,0.04);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .micro-list {
      display: grid;
      gap: 8px;
    }

    .micro-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0,212,255,0.045);
    }

    .micro-row:last-child {
      border-bottom: 0;
    }

    .quality-bar {
      width: 100%;
      height: 5px;
      margin-top: 7px;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(90,122,150,0.12);
    }

    .quality-fill {
      height: 100%;
      background: var(--accent);
    }

    .alert-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .alert-column {
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .alert-card {
      border-left-color: rgba(0,212,255,0.24);
    }

    .alert-card.tier-1 {
      border-left-color: rgba(255,61,107,0.42);
    }

    .alert-card.tier-2 {
      border-left-color: rgba(255,209,102,0.38);
    }

    .alert-card.tier-3 {
      border-left-color: rgba(90,122,150,0.22);
    }

    .muted {
      color: var(--text-dim);
    }

    .divider {
      height: 1px;
      margin: 12px 0;
      background: rgba(0,212,255,0.055);
    }

    @media (max-width: 1200px) {
      :root {
        --sidebar-width: 88px;
      }

      .brand {
        padding: 22px 12px 18px;
      }

      .brand-title {
        font-size: 16px;
        text-align: center;
      }

      .brand-title .word {
        display: none;
      }

      .brand-meta,
      .nav-label,
      .sidebar-telemetry .label,
      .sidebar-telemetry .value,
      .risk-rail {
        display: none;
      }

      .nav-button {
        grid-template-columns: 1fr;
        justify-items: center;
        padding: 0;
      }

      .sidebar-telemetry {
        padding: 12px;
      }

      .telemetry-grid {
        grid-template-columns: 1fr;
      }

      .telemetry-cell {
        min-height: 24px;
        padding: 0;
        border-color: transparent;
        background: transparent;
      }

      .topbar {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .topbar-item:nth-child(n+5) {
        display: none;

      .metric-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .spotlight-grid,
      .quad-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .span-9,
      .span-8,
      .span-7,
      .span-6,
      .span-5,
      .span-4,
      .span-3,
      .span-2 {
        grid-column: span 12;
      }
    }

    @media (max-width: 768px) {
      :root {
        --sidebar-width: 0px;
        --topbar-height: 92px;
      }

      .sidebar {
        position: sticky;
        top: 0;
        right: 0;
        bottom: auto;
        width: 100%;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .brand,
      .sidebar-telemetry {
        display: none;
      }

      .nav {
        display: flex;
        gap: 4px;
        overflow-x: auto;
        padding: 8px;
      }

      .nav-button {
        flex: 0 0 auto;
        grid-template-columns: auto auto;
        min-width: 118px;
        padding: 0 10px;
      }

      .nav-label {
        display: inline;
        font-size: 10px;
      }

      .topbar {
        position: sticky;
        top: 42px;
        left: 0;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar-item:nth-child(n+5) {
        display: flex;
      }

      .topbar-item:nth-child(n+3) {
        display: none;
      }

      .workspace {
        margin-left: 0;
        padding: 8px;
      }

      .workspace-inner {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .span-12,
      .span-9,
      .span-8,
      .span-7,
      .span-6,
      .span-5,
      .span-4,
      .span-3,
      .span-2 {
        grid-column: span 4;
      }

      .metric-grid,
      .split-grid,
      .triple-grid,
      .quad-grid,
      .spotlight-grid,
      .alert-grid,
      .skeleton-grid {
        grid-template-columns: 1fr;
      }

      .panel-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        width: 100%;
        justify-content: stretch;
      }

      .select-control {
        width: 100%;
      }

      .playbook,
      .rule-row {
        grid-template-columns: 1fr;
      }

      .table-wrap {
        max-height: none;
        border: 0;
        background: transparent;
      }

      table {
        min-width: 0;
      }

      thead {
        display: none;
      }

      tbody,
      tr,
      td {
        display: block;
        width: 100%;
      }

      tr {
        margin-bottom: 8px;
        border: 1px solid rgba(0,212,255,0.06);
        border-radius: var(--radius);
        background: rgba(10,16,30,0.64);
      }

      td {
        display: grid;
        grid-template-columns: 132px minmax(0, 1fr);
        gap: 10px;
        padding: 9px 10px;
        border-bottom: 1px solid rgba(0,212,255,0.04);
        white-space: normal;
      }

      td::before {
        content: attr(data-label);
        color: var(--text-dim);
        font-size: 9px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      .right,
      .center {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <section class="terminal-shell" aria-label="Institutional trading terminal">
    <aside class="sidebar" aria-label="Primary navigation">
      <section class="brand" aria-label="Terminal identity">
        <h1 class="brand-title"><span>Q</span><span class="word">UANT</span><br>TERMINAL</h1>
        <p class="brand-meta"><span id="sidebarModeDot" class="status-dot"></span><span id="sidebarMode">Initializing</span></p>
      </section>

      <nav id="tabNav" class="nav" role="tablist" aria-label="Terminal sections">
        <button class="nav-button" type="button" role="tab" aria-selected="true" data-tab="live">
          <span class="nav-index">01</span><span class="nav-label">Live Trading</span>
        </button>
        <button class="nav-button" type="button" role="tab" aria-selected="false" data-tab="eod">

        </button>
        <button class="nav-button" type="button" role="tab" aria-selected="false" data-tab="watchlist">
          <span class="nav-index">03</span><span class="nav-label">Watchlist</span>
        </button>
        <button class="nav-button" type="button" role="tab" aria-selected="false" data-tab="regime">
          <span class="nav-index">04</span><span class="nav-label">Regime</span>

        <button class="nav-button" type="button" role="tab" aria-selected="false" data-tab="scanner">
          <span class="nav-index">05</span><span class="nav-label">Scanner</span>

        <button class="nav-button" type="button" role="tab" aria-selected="false" data-tab="performance">
          <span class="nav-index">06</span><span class="nav-label">Performance</span>

      <section class="sidebar-telemetry" aria-label="Terminal telemetry">
        <section class="telemetry-grid">
          <article class="telemetry-cell">
            <span class="label">Uptime</span>

          <article class="telemetry-cell">
            <span class="label">Latency</span>
